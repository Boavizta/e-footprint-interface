
<div class="row">
    <div class="col-auto my-3">
        <a class="btn btn-white border border-dark rounded-2 fz-0-8"
           id="download-sources"
            target="_blank" href="{% url 'download-sources' %}">
            Export to xslx
        </a>
    </div>
    <div class="col-12">
        <table class="table">
            <thead class="text-start">
                <tr>
                    <th scope="col">Item name</th>
                    <th scope="col">Attribute of</th>
                    <th scope="col">Object Type</th>
                    <th scope="col">Value</th>
                    <th scope="col">Unit</th>
                    <th scope="col">Source</th>
                </tr>
            </thead>
            <tbody class="text-start">
                {% for item in sources %}
                <tr>
                    <th scope="row">{{ item.attr_name }}</th>
                    <td>{{ item.objectParentName }}</td>
                    <td>{{ item.objectType }}</td>
                    <td>{{ item.attr.value.magnitude }}</td>
                    <td>{{ item.attr.value.units }}</td>
                    <td>{{ item.attr.source.name }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
