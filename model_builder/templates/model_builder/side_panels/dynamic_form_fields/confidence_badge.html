{# Context vars: conf_dom_id (DOM id prefix), conf_name_prefix (form name prefix), conf_current (current level or None) #}
{% with conf_level=conf_current|default:"none" %}
<div class="confidence-wrap" data-field-id="{{ conf_dom_id }}">
    <button type="button"
            class="confidence-badge conf-{{ conf_level }}"
            data-level="{{ conf_level }}"
            data-action="toggle-confidence-menu"
            title="Set confidence level">
        <span class="bars {% if conf_level != 'none' %}bars-{{ conf_level }}{% endif %}"><i></i><i></i><i></i></span>
        <i class="bi bi-chevron-down"></i>
    </button>
    <div class="confidence-menu">
        <div class="menu-header">Set confidence level</div>
        <div class="menu-item {% if conf_level == 'high' %}selected{% endif %}"
             data-level="high"
             data-action="set-confidence">
            <span class="bars bars-high"><i></i><i></i><i></i></span>
            High
            <i class="bi bi-check2 check"></i>
        </div>
        <div class="menu-item {% if conf_level == 'medium' %}selected{% endif %}"
             data-level="medium"
             data-action="set-confidence">
            <span class="bars bars-medium"><i></i><i></i><i></i></span>
            Medium
            <i class="bi bi-check2 check"></i>
        </div>
        <div class="menu-item {% if conf_level == 'low' %}selected{% endif %}"
             data-level="low"
             data-action="set-confidence">
            <span class="bars bars-low"><i></i><i></i><i></i></span>
            Low
            <i class="bi bi-check2 check"></i>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item {% if conf_level == 'none' %}selected{% endif %}"
             data-level="none"
             data-action="set-confidence">
            <span class="bars"><i></i><i></i><i></i></span>
            Not set
            <i class="bi bi-check2 check"></i>
        </div>
    </div>
    <input type="hidden"
           name="{{ conf_name_prefix }}__confidence"
           id="{{ conf_dom_id }}__confidence"
           value="{% if conf_current %}{{ conf_current }}{% endif %}">
</div>
{% endwith %}
