<select
    class="form-control p-2"
    id="{{ field.web_id }}"
    name="{{ field.web_id }}"
    required
    data-default-value="{{ field.default }}"
    oninput="onInputValueChange(this.id);tagFormAsModified()"
>
    {% for option in field.options %}
        <option value="{{ option.value }}" {% if option.value == field.selected %}selected{% endif %}>
            {{ option.label }}</option>
    {% endfor %}
</select>
