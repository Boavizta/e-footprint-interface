<input
    type="text"
    class="form-control p-2"
    id="{{ field.web_id }}"
    name="{{ field.web_id }}"
    value="{{ field.default }}"
    data-default="{{ field.default }}"
    onclick="tagFormAsModified();"
    {% if object_to_edit %}
       _="on focusout if my value is empty set my value to my @data-default"
    {% else %}
       _="on click set my value to ''
          on focusout if my value is empty set my value to my @data-default"
    {% endif %}
required>
