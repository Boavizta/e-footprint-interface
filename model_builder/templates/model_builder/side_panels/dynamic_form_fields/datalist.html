<input
    class="form-control p-2"
    list="datalist_{{ field.web_id }}"
    id="{{ field.web_id }}"
    name="{{ field.web_id }}"
    autocomplete="off"
    {% if field.selected %}value="{{ field.selected }}"{% endif %}
    {% if object_to_edit %}
    _="on focusout if my value is empty set my value to my @data-default-value then onInputValueChange(@id)"
    {% else %}
    _="on mousedown set my value to ''
          on focusout if my value is empty set my value to my @data-default-value then onInputValueChange(@id)"
    {% endif %}
    data-default-value="{{ field.default }}"
    oninput="onInputValueChange(this.id);tagFormAsModified()"
    required
>
<datalist id="datalist_{{ field.web_id }}">
    <option selected value="select a provider">
</datalist>
