{% load static %}
{% if object_belongs_to_computable_system and object_to_edit.calculated_attributes|length > 0 %}
    <div class="accordion-item">
        <h2 class="accordion-header accordion-header-panel">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                    data-bs-target="#collapseCalculatedAttributes{{ object_to_edit.class_as_simple_str }}"
                    aria-expanded="false" aria-controls="collapseCalculatedAttributes">
                {{ object_to_edit.class_label }} calculated attributes
            </button>
        </h2>
        <div id="collapseCalculatedAttributes{{ object_to_edit.class_as_simple_str }}"
             class="accordion-collapse collapse" data-bs-parent="#accordionAllAttributes">
            <div class="accordion-body gy-2">
                {% for item in object_to_edit.calculated_attributes_values %}
                    <div class="d-flex flex-row mb-3 align-items-center">
                        <input disabled name="calculated_attributes{{ item.attr_name_in_mod_obj_container }}" value="{{ item.label|capfirst }}" class="form-control">
                        <button type="button" class="btn bg-white border-0 py-auto"
                                data-bs-toggle="collapse"
                                data-bs-target="#collapse-calculated_attributes{{ item.attr_name_in_mod_obj_container }}"
                                aria-expanded="false"
                                aria-controls="collapse-calculated_attributes{{ item.attr_name_in_mod_obj_container }}"
                            >
                            <img src="{% static 'icons/formula.svg' %}" width="16" height="16" alt="formula-icon" >
                        </button>
                        <a href="{% url 'display-calculus-graph' object_to_edit.efootprint_id item.attr_name_in_mod_obj_container %}" target="_blank">
                            <img src="{% static 'icons/calculus-graph.svg' %}" alt="calculus-graph-icon">
                        </a>
                    </div>
                    <div class="collapse" id="collapse-calculated_attributes{{ item.attr_name_in_mod_obj_container }}">
                        <div class="card card-body mb-3 no-truncate">
                            {{ item.explain }}
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
{% endif %}
