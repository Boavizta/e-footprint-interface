<script>
    function addObjectToGroup(objectId) {
        const select = document.getElementById(`add-to-group-select-${objectId}`);
        if (!select || !select.value) {
            return;
        }
        const groupId = select.value;
        const resultPaneHidden = document.getElementById("btn-open-panel-result").style.display === "none";
        const values = resultPaneHidden ? { recomputation: true } : {};
        htmx.ajax("POST", `/model_builder/link-dict-entry/${groupId}/${objectId}/`, {
            swap: "none",
            values: values
        });
    }
</script>
