{% load static %}
<div id="{{ usage_journey.web_id }}"
     class="leader-line-object card list-group-item my-3 mb-1 py-2 px-0 model-builder-card cursor"
     data-link-to="{{ usage_journey.links_to }}" data-line-opt="{{ usage_journey.data_line_opt }}">
    <div class="accordion accordion-flush">
        <div class="accordion-item">
            <div class="accordion-header px-3 d-flex align-items-center">
                <button type="button" class="chevron-btn btn btn-link p-2 me-2 text-black"
                        data-bs-toggle="collapse" data-bs-target="#flush-{{ usage_journey.web_id }}" onclick="reverseIconAccordion('{{ usage_journey.web_id }}')" aria-expanded="true" aria-controls="collapseOne">
                        <svg id="icon_accordion_{{ usage_journey.web_id }}" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="#9CA3AF" stroke-width="3" class="bi bi-chevron-right chevron-rotate" viewBox="0 0 16 16">
                            <path fill="none" stroke-linecap="round" stroke-linejoin="round" d="M4.646 1.646l6 6-6 6" />
                        </svg>
                </button>
                <button id="button-{{ usage_journey.web_id }}"
                        class="btn btn-white ms-1 w-100 text-start d-flex flex-row justify-content-between align-items-center"
                        type="button"
                        hx-get="/model_builder/open-edit-object-panel/{{ usage_journey.efootprint_id }}/"
                        hx-target="#sidePanel"
                        hx-trigger="click"
                        hx-swap="innerHTML"
                        hx-disabled-elt="button"
                        onmouseover="displayEditIcon('{{ usage_journey.web_id }}')"
                        onmouseout="hideEditIcon('{{ usage_journey.web_id }}')"
                >
                    <p class="{{ usage_journey.class_title_style }} mb-0">{{ usage_journey.name }}</p>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pen ms-3 d-none" viewBox="0 0 16 16">
                      <path d="m13.498.795.149-.149a1.207 1.207 0 1 1 1.707 1.708l-.149.148a1.5 1.5 0 0 1-.059 2.059L4.854 14.854a.5.5 0 0 1-.233.131l-4 1a.5.5 0 0 1-.606-.606l1-4a.5.5 0 0 1 .131-.232l9.642-9.642a.5.5 0 0 0-.642.056L6.854 4.854a.5.5 0 1 1-.708-.708L9.44.854A1.5 1.5 0 0 1 11.5.796a1.5 1.5 0 0 1 1.998-.001m-.644.766a.5.5 0 0 0-.707 0L1.95 11.756l-.764 3.057 3.057-.764L14.44 3.854a.5.5 0 0 0 0-.708z"/>
                    </svg>
                </button>
            </div>
            <div id="flush-{{ usage_journey.web_id }}" class="accordion-collapse show accordion-all" data-bs-parent="#{{ usage_journey.web_id }}">
                <div class="accordion-body py-0 ps-3 pe-0">
                    {% for usage_journey_step in usage_journey.uj_steps %}
                        {% include 'model_builder/object_cards/usage_journey_step_card.html' %}
                    {% endfor %}
                    <div class="row g-0">
                        <div class="col-2 p-0 justify-content-center leader-line-object"
                             id="add-usage-pattern-{{ usage_journey.web_id }}"
                             style="height:1px !important;margin-left: 2px;"
                        ></div>
                        <div class="col-10 p-0 justify-content-center" style="height:1px !important;"></div>
                        <div class="col-12 mb-3 pe-3">
                            <button class="btn bg-white dotted-border w-100 h8"
                                    hx-get="/model_builder/open-create-object-panel/UsageJourneyStep"
                                    hx-target="#sidePanel"
                                    hx-trigger="click"
                                    hx-swap="innerHTML"
                                    hx-vals='{"efootprint_id_of_parent_to_link_to": "{{ usage_journey.efootprint_id }}"}'
                                    hx-disabled-elt="button"
                            >
                                <div class="row py-1">
                                    <div class="col-2 justify-content-center">
                                        <img src="{% static 'icons/add_icon.svg' %}" class="border-2 border-white"  width="18px" height="18px" alt="add icon" style="padding-left: 2px;" />
                                    </div>
                                    <div class="col-10 text-start">
                                        Add usage journey step
                                    </div>
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
