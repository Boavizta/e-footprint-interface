<div id="{{ usage_pattern.web_id }}"
     class="leader-line-object list-group-item my-3 mb-1 p-2 model-builder-card cursor"
     data-link-to="{{ usage_pattern.links_to }}" data-line-opt="{{ usage_pattern.data_line_opt }}">
    <button id="button-{{ usage_pattern.web_id }}"
            class="btn btn-white text-start d-flex flex-row justify-content-between w-100"
            type="button"
            hx-get="/model_builder/open-edit-object-panel/{{ usage_pattern.efootprint_id }}"
            hx-target="#sidePanel"
            hx-trigger="click"
            hx-swap="innerHTML"
            hx-disabled-elt="button"
            onmouseover="displayEditIcon('{{ usage_pattern.web_id }}')"
            onmouseout="hideEditIcon('{{ usage_pattern.web_id }}')"
    >
        <p class="{{ usage_pattern.class_title_style }} mb-0">{{ usage_pattern.name}}</p>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pen ms-3 d-none" viewBox="0 0 16 16">
          <path d="m13.498.795.149-.149a1.207 1.207 0 1 1 1.707 1.708l-.149.148a1.5 1.5 0 0 1-.059 2.059L4.854 14.854a.5.5 0 0 1-.233.131l-4 1a.5.5 0 0 1-.606-.606l1-4a.5.5 0 0 1 .131-.232l9.642-9.642a.5.5 0 0 0-.642.056L6.854 4.854a.5.5 0 1 1-.708-.708L9.44.854A1.5 1.5 0 0 1 11.5.796a1.5 1.5 0 0 1 1.998-.001m-.644.766a.5.5 0 0 0-.707 0L1.95 11.756l-.764 3.057 3.057-.764L14.44 3.854a.5.5 0 0 0 0-.708z"/>
        </svg>
    </button>
</div>
