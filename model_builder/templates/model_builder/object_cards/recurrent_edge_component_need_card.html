<div id="{{ object.web_id }}" class="w-100 mb-2">
    <button
            id="button-{{ object.web_id }}"
            class="leader-line-object btn btn-white text-end d-flex flex-row justify-content-end w-100 flex-grow-1 overflow-hidden border-2 position-relative min-w-0"
            data-link-to="{{ object.links_to }}" data-line-opt="{{ object.data_line_opt }}"
            hx-get="/model_builder/open-edit-object-panel/{{ object.efootprint_id }}/"
            hx-target="#sidePanel"
            hx-trigger="click"
            hx-swap="innerHTML"
            hx-disabled-elt="button"
            _="
                on click removeAllOpenedObjectsHighlights() add .model-builder-card-opened on me
                on mouseover remove .d-none from #edit-icon-{{ object.web_id }}
                on mouseout add .d-none to #edit-icon-{{ object.web_id }}
            "
    >
        {% include 'model_builder/components/button_card_header.html' with object_card=object title_class="h8 text-secondary" %}
    </button>
</div>
