name: Django CI

on:
    push:
        branches: [main]
    pull_request:
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.12", "3.13"]

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install Poetry
              run: pipx install "poetry>=2,<3"

            - name: Cache Poetry virtualenv
              uses: actions/cache@v4
              with:
                  path: .venv
                  key: poetry-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

            - name: Configure Poetry to use in-project venv
              run: poetry config virtualenvs.in-project true

            - name: Install Dependencies
              run: poetry install

            - name: Create .env file
              run: |
                  echo DJANGO_PROD=False >> .env
                  echo SECRET_KEY=ci_secret_key >> .env

            - name: Run migrations
              run: |
                  poetry run python manage.py makemigrations
                  poetry run python manage.py migrate

            - name: Run unit and integration tests
              run: poetry run pytest tests/unit_tests tests/integration

            - name: Install Playwright browsers
              run: poetry run playwright install --with-deps chromium

            - name: Start Django server
              run: poetry run python manage.py runserver &

            - name: Wait for server to be ready
              run: until nc -z localhost 8000; do sleep 1; done

            - name: Run E2E tests
              run: poetry run pytest tests/e2e --base-url http://localhost:8000
